global:
  security:
    allowInsecureImages: true

image:
  registry: docker.io
  repository: bitnamilegacy/redis-cluster
  tag: 7.2.5-debian-12-r4

usePassword: false

cluster:
  init: true
  nodes: 6
  replicas: 1

persistence:
  enabled: true
  size: 5Gi

redis:
  useAOFPersistence: "no"
  configmap: |-
    maxmemory 1gb
    maxmemory-policy allkeys-lru
    cluster-preferred-endpoint-type ip

metrics:
  enabled: false
  serviceMonitor:
    enabled: false
    labels:
      release: monitoring
