global:
  security:
    allowInsecureImages: true

image:
  registry: docker.io
  repository: bitnamilegacy/redis-cluster
  tag: 7.2.5-debian-12-r4

usePassword: false

cluster:
  init: true
  nodes: 6
  replicas: 1

persistence:
  enabled: true
  storageClass: pd-ssd-rwo
  size: 8Gi

redis:
  useAOFPersistence: "no"
  startupProbe:
    enabled: true
    initialDelaySeconds: 20
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 36
  livenessProbe:
    enabled: true
    initialDelaySeconds: 180
    periodSeconds: 10
    timeoutSeconds: 6
    failureThreshold: 12
  readinessProbe:
    enabled: true
    initialDelaySeconds: 20
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 18
  resources:
    requests:
      cpu: "2"
      memory: "7Gi"
    limits:
      cpu: "2"
      memory: "7Gi"
  configmap: |-
    maxmemory 5200mb
    maxmemory-policy allkeys-lru
    maxmemory-clients 7%
    maxclients 16000

metrics:
  enabled: false
  serviceMonitor:
    enabled: false
    labels:
      release: monitoring
